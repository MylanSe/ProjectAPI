services:
  # Service MongoDB
  mongodb:
    image: mongo:7.0
    container_name: configurateur_pc_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: configurateur_pc
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - configurateur_network

  # Service Application Node.js
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: configurateur_pc_app
    restart: unless-stopped
    environment:
      - PORT=3000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/configurateur_pc?authSource=admin
      - JWT_SECRET=votre_secret_jwt_super_securise_a_changer
      - JWT_EXPIRE=7d
      - ADMIN_EMAIL=admin@configurateurpc.com
      - ADMIN_PASSWORD=Admin123!
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
    networks:
      - configurateur_network
    # Optionnel: pour le développement en hot-reload
    # volumes:
    #   - .:/app
    #   - /app/node_modules

# Volumes pour la persistance des données
volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

# Réseau pour la communication entre conteneurs
networks:
  configurateur_network:
    driver: bridge
